<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRA VIP MOD PANEL</title>
    <style>
        body { background: #080808; color: #ff0000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 0; }
        .container { max-width: 450px; margin: 30px auto; padding: 20px; }
        .panel { border: 2px solid #ff0000; padding: 25px; border-radius: 20px; background: #111; box-shadow: 0 0 25px #ff0000; position: relative; overflow: hidden; }
        .panel::before { content: "VIP"; position: absolute; top: -10px; right: -10px; background: #ff0000; color: #fff; padding: 10px 25px; transform: rotate(45deg); font-weight: bold; font-size: 12px; }
        h1 { margin-bottom: 5px; font-size: 26px; letter-spacing: 2px; text-shadow: 2px 2px 5px #000; }
        .sub-text { color: #888; font-size: 12px; margin-bottom: 20px; }
        
        .btn-group { margin: 20px 0; }
        button { background: #ff0000; color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; margin: 10px 0; cursor: pointer; font-size: 16px; transition: 0.3s; box-shadow: 0 4px 0 #800; }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #800; }
        .btn-off { background: #333; box-shadow: 0 4px 0 #111; }
        
        .status-box { background: #000; padding: 15px; border-radius: 10px; margin-top: 25px; border: 1px dashed #ff0000; }
        #status { font-size: 14px; font-weight: bold; color: #ffcc00; text-transform: uppercase; }
        .footer { margin-top: 20px; font-size: 10px; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel">
            <h1>🎯 AIRA VIP PANEL</h1>
            <div class="sub-text">SERVER-SIDE HEADSHOT TECHNOLOGY</div>
            <hr color="#222">

            <div class="btn-group">
                <button onclick="updateStatus('ON')">🔥 ACTIVATE HEADSHOT + MAGIC</button>
                <button class="btn-off" onclick="updateStatus('OFF')">❌ DEACTIVATE ALL MODS</button>
            </div>

            <div class="status-box">
                <div id="status">System Ready...</div>
            </div>
        </div>
        <div class="footer">DEVELOPED BY FIRSTBOT00028 | VERSION 1.0</div>
    </div>

    <script>
        // --- CONFIGURATION (Ninte Data Ivide Idu) ---
        const TOKEN = "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"; // Ninte ghp_... token ivide idu
        const OWNER = "firstbot00028";
        const REPO = "Airaffpannel";
        const FILE_PATH = "data.json";

        async function updateStatus(val) {
            const statusLabel = document.getElementById('status');
            statusLabel.innerHTML = "📡 CONNECTING TO SERVER...";
            statusLabel.style.color = "#ffcc00";

            try {
                // 1. Fetch current file to get SHA
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
                const getRes = await fetch(url, {
                    headers: { "Authorization": `token ${TOKEN}` }
                });
                
                if (!getRes.ok) throw new Error("Invalid Token or Repo!");

                const fileData = await getRes.json();
                const sha = fileData.sha;

                // 2. Prepare JSON content
                const newContent = {
                    headshot: val,
                    magic_body: val,
                    last_update: new Date().toLocaleString(),
                    dev: "Aira"
                };
                
                // Base64 Encoding for GitHub API
                const encodedContent = btoa(unescape(encodeURIComponent(JSON.stringify(newContent, null, 2))));

                // 3. PUT Request to Update File
                const putRes = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `Panel Switch: ${val}`,
                        content: encodedContent,
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    statusLabel.innerHTML = `✅ SERVER UPDATED: ${val}`;
                    statusLabel.style.color = "#00ff00";
                } else {
                    statusLabel.innerHTML = "❌ UPDATE FAILED!";
                    statusLabel.style.color = "#ff0000";
                }

            } catch (error) {
                statusLabel.innerHTML = "⚠️ ERROR: " + error.message;
                statusLabel.style.color = "#ff0000";
            }
        }
    </script>
</body>
</html>
