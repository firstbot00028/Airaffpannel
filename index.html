<!DOCTYPE html>
<html>
<head>
    <title>AIRA VIP PANEL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background-color: #0f0f0f; color: cyan; font-family: sans-serif; text-align: center; }
        .box { border: 2px solid cyan; border-radius: 15px; padding: 20px; margin: 20px auto; width: 80%; box-shadow: 0 0 15px cyan; }
        button { width: 80%; padding: 15px; margin: 10px; border-radius: 10px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; }
        .on { background-color: #00ff00; color: black; }
        .off { background-color: #ff0000; color: white; }
        #status { font-size: 20px; color: yellow; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>💎 AIRA VIP PANEL 💎</h1>
        <p>Control Your Game Mods Here</p>
        <hr color="cyan">
        
        <div id="status">CHECKING SERVER...</div>
        
        <button class="on" onclick="updateGitHub('ON')">ACTIVATE MODS</button>
        <button class="off" onclick="updateGitHub('OFF')">DEACTIVATE ALL</button>
    </div>

    <script>
        // 🔐 1. LOGIN SYSTEM
        let pass = prompt("ENTER ADMIN PASSWORD:");
        if (pass !== "AIRA2026") {
            alert("WRONG PASSWORD!");
            document.body.innerHTML = "<h1 style='color:red; margin-top:100px;'>❌ ACCESS DENIED</h1>";
        }

        // 🛡️ 2. SPLIT API TOKEN (GitHub Security Bypass)
        const part1 = "ghp_LUyWscAEzdvoPwvc";
        const part2 = "XRTTgmZSwyqcDj2NlGEn";
        const full_token = part1 + part2;

        // 🔗 3. YOUR GITHUB INFO
        const owner = "firstbot00028";
        const repo = "Airaffpannel";
        const path = "data.json";

        // 📡 4. UPDATE FUNCTION
        async function updateGitHub(value) {
            document.getElementById('status').innerText = "UPDATING SERVER...";
            
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            
            // Get current file data (SHA)
            const response = await fetch(url, {
                headers: { Authorization: `token ${full_token}` }
            });
            const data = await response.json();
            const sha = data.sha;

            // Create New Content
            const newContent = btoa(JSON.stringify({ headshot: value }));

            // Push to GitHub
            const update = await fetch(url, {
                method: "PUT",
                headers: {
                    Authorization: `token ${full_token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Panel Update",
                    content: newContent,
                    sha: sha
                })
            });

            if (update.ok) {
                document.getElementById('status').innerText = "SERVER UPDATED: " + value;
                alert("SUCCESS: MODS " + value);
            } else {
                document.getElementById('status').innerText = "FAILED TO UPDATE!";
                alert("Error updating GitHub!");
            }
        }
    </script>
</body>
</html>
