<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRA VIP PANEL</title>
    <style>
        body { background: #0a0a0a; color: #ff0000; font-family: sans-serif; text-align: center; }
        .box { border: 2px solid #ff0000; padding: 20px; margin: 20px; border-radius: 15px; box-shadow: 0 0 20px #ff0000; }
        button { background: #ff0000; color: #fff; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; }
        .info { color: #00ff00; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎯 AIRA VIP CONTROL</h1>
        <p>Server-Side Headshot Control</p>
        <hr color="#333">
        <button onclick="updateStatus('ON')">ACTIVATE HEADSHOT</button>
        <button onclick="updateStatus('OFF')" style="background:#333;">DEACTIVATE</button>
        <div id="status" class="info">Current: Fetching...</div>
    </div>
    <div class="box" style="margin-top:20px; border-color: #ffcc00;">
    <h3 style="color:#ffcc00;">✨ MAGIC TECHNOLOGY</h3>
    <button onclick="updateMagic('ON')" style="background:#ffcc00; color:#000;">BODY TO HEAD: ON</button>
    <button onclick="updateMagic('OFF')" style="background:#444;">BODY TO HEAD: OFF</button>
    </div>
    

    <script>
        // --- JS START ---
const TOKEN = "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"; // Ninte token ivide idu
const OWNER = "firstbot00028";
const REPO = "Airaffpannel";
const FILE_PATH = "data.json";

async function sendUpdate(val) {
    const log = document.getElementById('log');
    log.innerHTML = "Connecting to Server...";
    log.style.color = "#ffcc00";

    try {
        const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
        
        // 1. Current file details fetch cheyyan (SHA kittaan)
        const getRes = await fetch(url, {
            headers: { "Authorization": `token ${TOKEN}` }
        });
        const fileData = await getRes.json();
        const sha = fileData.sha;

        // 2. Puthiya data set cheyyan
        const newContent = {
            headshot: val,
            magic_body: val,
            updated_at: new Date().toLocaleString()
        };
        
        // JSON-ne Base64-lekku maattanum (GitHub API rule aanu)
        const encodedContent = btoa(unescape(encodeURIComponent(JSON.stringify(newContent, null, 2))));

        // 3. GitHub-ilekku push cheyyan
        const putRes = await fetch(url, {
            method: "PUT",
            headers: {
                "Authorization": `token ${TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: `Status Changed to ${val}`,
                content: encodedContent,
                sha: sha
            })
        });

        if (putRes.ok) {
            log.innerHTML = `✅ SERVER UPDATED: ${val}`;
            log.style.color = "#00ff00";
        } else {
            log.innerHTML = "❌ FAILED! Check Token or Repo Name.";
            log.style.color = "#ff0000";
        }

    } catch (error) {
        log.innerHTML = "⚠️ ERROR: " + error.message;
        log.style.color = "#ff0000";
    }
}
// --- JS END ---
        
        // GitHub API vazhi data.json update cheyyan ulla function
        async function updateStatus(val) {
            document.getElementById('status').innerHTML = "Updating Server...";
            // Note: Real GitHub API update-inu 'PAT Token' venam. 
            // Ippo ninakku manually GitHub-il file edit cheyyaam, 
            // dashboard-il ithu engane varum ennu namukku set aakkaam.
            alert("Headshot Status Changed to: " + val);
            document.getElementById('status').innerHTML = "Current: " + val;
        }
    </script>
</body>
</html>
