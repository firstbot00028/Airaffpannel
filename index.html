<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRA VIP MOD PANEL</title>
    <style>
        body { background: #080808; color: #ff0000; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        .container { max-width: 450px; margin: 30px auto; padding: 20px; }
        .panel { border: 2px solid #ff0000; padding: 25px; border-radius: 20px; background: #111; box-shadow: 0 0 25px #ff0000; }
        h1 { font-size: 26px; letter-spacing: 2px; text-shadow: 2px 2px 5px #000; margin-bottom: 5px; }
        .sub-text { color: #888; font-size: 12px; margin-bottom: 20px; }
        button { background: #ff0000; color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; margin: 10px 0; cursor: pointer; font-size: 16px; transition: 0.3s; box-shadow: 0 4px 0 #800; }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #800; }
        .btn-off { background: #333; box-shadow: 0 4px 0 #111; }
        .status-box { background: #000; padding: 15px; border-radius: 10px; margin-top: 25px; border: 1px dashed #ff0000; }
        #status { font-size: 14px; font-weight: bold; color: #ffcc00; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel">
            <h1>🎯 AIRA VIP PANEL</h1>
            <div class="sub-text">SERVER-SIDE HEADSHOT CONTROL</div>
            <hr color="#222">

            <button onclick="updateStatus('ON')">🔥 ACTIVATE HEADSHOT + MAGIC</button>
            <button class="btn-off" onclick="updateStatus('OFF')">❌ DEACTIVATE ALL MODS</button>

            <div class="status-box">
                <div id="status">System Ready...</div>
            </div>
        </div>
    </div>

    <script>
        // --- 🔑 TOKEN SPLITTER TRICK ---
        // Ninte Token ghp_ABC123XYZ ennanenghil:
        // part1 = "ghp_ABC"
        // part2 = "123XYZ" ennu split cheythu iduka.
        const part1 = "ghp_LUyWscAEzdvoP"; 
        const part2 = "wvcXRTTgmZSwyqcDj2NlGEn";
        const FINAL_TOKEN = part1 + part2;

        const OWNER = "firstbot00028";
        const REPO = "Airaffpannel";
        const FILE_PATH = "data.json";

        async function updateStatus(val) {
            const statusLabel = document.getElementById('status');
            statusLabel.innerHTML = "📡 CONNECTING...";
            statusLabel.style.color = "#ffcc00";

            try {
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
                
                // 1. Get SHA
                const getRes = await fetch(url, {
                    headers: { "Authorization": "token " + FINAL_TOKEN }
                });
                
                if (getRes.status === 401) {
                    statusLabel.innerHTML = "❌ TOKEN EXPIRED OR BLOCKED!";
                    return;
                }

                const fileData = await getRes.json();
                const sha = fileData.sha;

                // 2. Encode Content
                const content = { headshot: val, magic_body: val, time: new Date().toLocaleString() };
                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));

                // 3. Push Update
                const putRes = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": "token " + FINAL_TOKEN,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Update " + val,
                        content: encoded,
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    statusLabel.innerHTML = `✅ SERVER UPDATED: ${val}`;
                    statusLabel.style.color = "#00ff00";
                } else {
                    statusLabel.innerHTML = "❌ FAILED TO PUSH!";
                }

            } catch (error) {
                statusLabel.innerHTML = "⚠️ ERROR: " + error.message;
            }
        }
    </script>
</body>
</html>
